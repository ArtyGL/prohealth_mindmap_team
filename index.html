<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ProHealth — Mind Map V13</title>
<style>

:root {
  --bg:#f4f7fc;
  --grid:rgba(228,235,248,0.12);
  --line:#bfd0ee;
  --line-strong:#97b3e6;
  --node:#ffffff;
  --node-soft:#f9fbff;
  --border:#c6d6f1;
  --text:#14325f;
  --toggle-bg:#eef4ff;
  --toggle-border:#b9ccf2;
  --toggle-text:#2f62c6;
  --shadow:0 10px 28px rgba(38,73,138,.06);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
body{
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:40px 40px;
}
.viewport{position:relative;width:100vw;height:100vh;overflow:hidden;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none}
.viewport.dragging{cursor:grabbing}
.canvas{position:absolute;left:0;top:0;transform-origin:0 0;padding:110px 180px 120px 90px;width:max-content;min-width:100%;min-height:100%;transition:transform .28s ease}

.toolbar{
  position:fixed;top:16px;right:16px;z-index:40;
  display:flex;gap:8px;flex-wrap:wrap;padding:10px;border-radius:14px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border:1px solid #d4e1f8;box-shadow:0 12px 26px rgba(31,61,120,.08);
}
.toolbtn{
  border:1px solid #c6d6f1;background:white;color:#21406f;
  border-radius:10px;padding:9px 12px;font-size:14px;cursor:pointer;min-width:42px;
}
.toolbtn:hover{background:#f6f9ff}

.menu-toggle{
  position:fixed;top:16px;right:16px;z-index:45;
  width:44px;height:44px;border-radius:12px;
  border:1px solid #d4e1f8;background:rgba(255,255,255,.92);
  box-shadow:0 12px 26px rgba(31,61,120,.08);
  backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;
  cursor:pointer;color:#21406f;
}
.menu-toggle .bars{width:18px;height:12px;position:relative;display:block}
.menu-toggle .bars::before,
.menu-toggle .bars::after,
.menu-toggle .bars span{
  content:"";position:absolute;left:0;right:0;height:2px;background:currentColor;border-radius:2px;
}
.menu-toggle .bars::before{top:0}
.menu-toggle .bars span{top:5px}
.menu-toggle .bars::after{bottom:0}

.hint{
  position:fixed;left:16px;top:16px;z-index:30;
  padding:10px 12px;border-radius:12px;font-size:13px;color:#49658f;
  background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
  border:1px solid #d4e1f8;box-shadow:0 10px 24px rgba(31,61,120,.06);
}

.tree,.tree ul{list-style:none;margin:0;padding:0}
.tree>li{padding-left:0}
.tree ul{margin-left:64px;position:relative}
.tree li{position:relative;margin:12px 0;padding-left:38px}
.tree li::before{content:"";position:absolute;left:0;top:-14px;width:2px;height:calc(100% + 16px);background:var(--line)}
.tree li::after{content:"";position:absolute;left:0;top:29px;width:18px;height:2px;background:var(--line)}
.tree>li::before,.tree>li::after{display:none}
.tree li:last-child::before{height:43px}

.node-row{display:flex;align-items:flex-start;position:relative}
.node-card{
  width:900px;min-width:900px;max-width:900px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:15px 16px 15px 20px;background:var(--node);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);color:var(--text);
  background-clip:padding-box;
}
.depth-0 > .node-row > .node-card{width:960px;min-width:960px;max-width:960px;font-size:20px;font-weight:700;border-color:var(--line-strong)}
.depth-1 > .node-row > .node-card{font-size:17px;font-weight:700;background:var(--node-soft)}
.depth-2 > .node-row > .node-card{font-size:15px;font-weight:600}
.depth-3 > .node-row > .node-card{font-size:14px;font-weight:500}
.depth-4 > .node-row > .node-card,
.depth-5 > .node-row > .node-card,
.depth-6 > .node-row > .node-card{font-size:14px;font-weight:450}

.node-text{flex:1;line-height:1.45;white-space:normal;word-break:break-word;-webkit-user-select:none;user-select:none}
.toggle{
  flex:0 0 auto;width:26px;height:26px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:var(--toggle-bg);border:1px solid var(--toggle-border);color:var(--toggle-text);
  font-size:16px;font-weight:700;line-height:1;margin-top:0;user-select:none;padding:0;
}
.toggle > .sym{display:block;line-height:1;transform:translateY(-0.5px)}
.toggle.hidden{visibility:hidden}
.node-card.clickable{cursor:pointer}
.children{display:none;opacity:1}
.children.open{display:block}
.children > li{opacity:0;transform:translateY(-8px);transition:opacity .18s ease, transform .18s ease}
.children.open > li.reveal{opacity:1;transform:translateY(0)}

@media (max-width: 900px){
  .menu-toggle{display:flex}
  .toolbar{
    top:68px;right:16px;left:auto;max-width:calc(100vw - 32px);
    flex-direction:column;align-items:stretch;gap:6px;
    transform:translateY(-8px);opacity:0;pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
  }
  .toolbar.open{transform:translateY(0);opacity:1;pointer-events:auto}
  .hint{max-width:calc(100vw - 32px);font-size:12px;padding:8px 10px}
}

@media (max-width:1000px){
  .canvas{padding:100px 110px 120px 70px}
  .tree ul{margin-left:52px}
  .tree li{padding-left:34px}
  .tree li::after{width:16px}
  .node-card{width:700px;min-width:700px;max-width:700px}
  .depth-0 > .node-row > .node-card{width:760px;min-width:760px;max-width:760px}
}

</style>
</head>

  <div class="viewport" id="viewport">
    <div class="canvas" id="canvas"></div>

ывы","children":[]},{"text":"на этой основе предложить обоснованную логику дальнейшей работы над продуктом","children":[]}]},{"text":"Ближайшая продуктовая цель","children":[{"text":"собрать MVP продукта","children":[]}]},{"text":"Решение","children":[{"text":"Product Audit + системная продуктовая сборка проекта","children":[{"text":"чтобы объективно оценить, что уже есть в проекте, чего не хватает, где остаются разрывы и как должна двигаться работа дальше по направлению к MVP, потребовалось сначала собрать целостную системную картину продукта","children":[]},{"text":"в результате была зафиксирована карта продукта:","children":[{"text":"как продукт должен быть устроен","children":[]},{"text":"что необходимо сделать","children":[]},{"text":"как он должен собираться и в какой последовательности","children":[]}]},{"text":"были зафиксированы ключевые продуктовые слои на пути к MVP:","children":[{"text":"Strategy / Market","children":[]},{"text":"Product Definition","children":[]},{"text":"UX Concept","children":[]},{"text":"User Flows / Information Architecture","children":[]},{"text":"Prototype Validation","children":[]},{"text":"Visual Direction","children":[]},{"text":"Design Production","children":[]},{"text":"MVP / First Working Version","children":[]}]}]},{"text":"это основа, на которой уже можно последовательно и обоснованно двигаться к MVP","children":[]}]},{"text":"Риски при движении к MVP без системной продуктовой рамки","children":[{"text":"продуктовый риск","children":[{"text":"собрать не тот MVP: включить лишнее и при этом не собрать критически важное","children":[]},{"text":"зафиксировать в продукте не ту логику, которая действительно нужна пользователю","children":[]},{"text":"получить рабочую версию продукта, которая формально существует, но слабо решает ключевую задачу","children":[]}]},{"text":"риск искажения приоритетов","children":[{"text":"решения о том, что делать дальше, начинают приниматься ситуативно","children":[]},{"text":"в приоритете оказыва изов и передача результатов в продукт","children":[]}]},{"text":"[частично] базовая expert-side рамка уже считывается из материалов клиента","children":[]}]},{"text":"expert-side context / контекст работы эксперта","children":[{"text":"в каком режиме эксперт подключается к продукту","children":[]},{"text":"работает ли он вручную, по запросу, по триггеру или как валидатор системной рекомендации","children":[]},{"text":"какие действия выполняет сам эксперт","children":[]},{"text":"какие действия остаются за системой","children":[]},{"text":"зона ответственности эксперта","children":[]},{"text":"доступность и время реакции","children":[]},{"text":"как эксперт реально работает внутри продукта","children":[]},{"text":"что ему критично видеть первым","children":[]},{"text":"какие действия для него должны быть быстрыми","children":[]},{"text":"где конкретно он подключается в цикл взаимодействия","children":[]},{"text":"что из этого обязательно входит в MVP, а что остаётся за его пределами","children":[]}]},{"text":"expert-side input data / входные данные для работы эксперта","children":[{"text":"анкета пользователя","children":[]},{"text":"цель пользователя","children":[]},{"text":"история тренировок","children":[]},{"text":"результаты анализов","children":[]},{"text":"ограничения и противопоказания","children":[]},{"text":"рекомендации системы","children":[]},{"text":"предыдущие заключения / комментарии экспертов","children":[]}]},{"text":"expert-side outputs / выходные данные работы эксперта","children":[{"text":"ограничения","children":[]},{"text":"корректировки","children":[]},{"text":"подтверждение / отклонение рекомендации","children":[]},{"text":"план питания","children":[]},{"text":"результаты медицинских анализов","children":[]},{"text":"экспертное заключение","children":[]},{"text":"комментарий","children":[]},{"text":"статус проверки","children":[]},{"text":"решение о допуске / недопуске","children":[]}]},{"text":"[нет] зафиксированной expert-side рамки продукта const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

function capFirst(str){
  if (!str) return '';
  str = String(str).trim();
  const m = str.match(/^([^A-Za-zА-Яа-яЁё]*)([A-Za-zА-Яа-яЁё])(.*)$/);
  return m ? m[1] + m[2].toUpperCase() + m[3] : str;
}

function createNode(item, depth=0){
  const li = document.createElement('li');
  li.className = `depth-${depth}`;

  const row = document.createElement('div');
  row.className = 'node-row';

  const card = document.createElement('div');
  card.className = 'node-card';

  const text = document.createElement('div');
  text.className = 'node-text';
  text.textContent = capFirst(item.text);

  const toggle = document.createElement('div');
  toggle.className = 'toggle';

  const hasChildren = Array.isArray(item.children) && item.children.length > 0;

  if (!hasChildren) {
    toggle.classList.add('hidden');
    toggle.textContent = '';
  } else {
    card.classList.add('clickable');
  }

  card.appendChild(text);
  card.appendChild(toggle);
  row.appendChild(card);
  li.appendChild(row);

  if (hasChildren) {
    const ul = document.createElement('ul');
    ul.className = 'children';
    item.children.forEach(child => ul.appendChild(createNode(child, depth+1)));
    li.appendChild(ul);

    const setState = (open) => {
      toggle.innerHTML = `<span class="sym">${open ? '−' : '+'}</span>`;
      li.dataset.open = open ? '1' : '0';

      const children = [...ul.children];
      children.forEach((child, i) => {
        child.style.transitionDelay = open ? `${i * 35}ms` : '0ms';
      });

      if (open) {
        ul.classList.add('open');
        children.forEach(child => child.classList.remove('reveal'));
        requestAnimationFrame(() => {
          children.forEach((child, i) => {
            setTimeout(() => child.classList.add('reveal'), i * 35);
          });
        });
      } else {
        children.forEach(child => child.classList.remove('reveal'));

        // Когда закрываем любой блок, полностью сворачиваем всё открытое внутри него.
        // Поэтому при повторном раскрытии ветка открывается чисто, без старых вложенных раскрытий.
        ul.querySelectorAll('.children').forEach(nestedUl => {
          const nestedLi = nestedUl.parentElement;
          const nestedToggle = nestedLi ? nestedLi.querySelector(':scope > .node-row .toggle') : null;

          if (nestedToggle && !nestedToggle.classList.contains('hidden')) {
            nestedToggle.innerHTML = '<span class="sym">+</span>';
          }
          if (nestedLi) nestedLi.dataset.open = '0';

          [...nestedUl.children].forEach(child => child.classList.remove('reveal'));
          nestedUl.classList.remove('open');
        });

        ul.classList.remove('open');
      }
    };

    setState(false);

    let lastToggleAt = 0;
    const onToggle = (e) => {
      const now = Date.now();
      if (now - lastToggleAt < 180) return;
      lastToggleAt = now;
      if (e) e.stopPropagation();

      const willOpen = li.dataset.open !== '1';
      setState(willOpen);
      setTimeout(() => applyTransform(), willOpen ? 180 : 120);
    };

    card.addEventListener('click', onToggle);
    toggle.addEventListener('click', onToggle);
  }

  return li;
}

function buildTree(){
  const ul = document.createElement('ul');
  ul.className = 'tree';
  ul.appendChild(createNode(data, 0));
  canvas.innerHTML = '';
  canvas.appendChild(ul);
}

buildTree();

let scale = 1, x = 40, y = 30;
let isDragging = false, dragMoved = false, startX = 0, startY = 0;
let pinchStartDist = null, pinchStartScale = 1;
let activeTouches = new Map();

function applyTransform(){
  canvas.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

function zoomAt(factor, cx = innerWidth/2, cy = innerHeight/2){
  const prev = scale;
  scale = Math.min(2.6, Math.max(0.22, scale * factor));
  const wx = (cx - x) / prev;
  const wy = (cy - y) / prev;
  x = cx - wx * scale;
  y = cy - wy * scale;
  applyTransform();
}

function setScaleAt(newScale, cx = innerWidth/2, cy = innerHeight/2){
  const prev = scale;
  scale = Math.min(2.6, Math.max(0.22, newScale));
  const wx = (cx - x) / prev;
  const wy = (cy - y) / prev;
  x = cx - wx * scale;
  y = cy - wy * scale;
  applyTransform();
}

function centerRoot(animate = true) {
  const root = document.querySelector('.tree > li > .node-row > .node-card');
  centerNodeInView(root, animate);
}

function centerNodeInView(target, animate = true) {
  if (!target) return;
  const prevTransition = canvas.style.transition;
  if (!animate) canvas.style.transition = 'none';

  const prevTransform = canvas.style.transform;
  canvas.style.transform = 'translate(0px, 0px) scale(1)';

  const rect = target.getBoundingClientRect();
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;

  x = Math.round((vw / 2) - (rect.left + rect.width / 2));
  y = Math.round((vh / 2) - (rect.top + rect.height / 2));

  canvas.style.transform = prevTransform;
  applyTransform();

  if (!animate) {
    requestAnimationFrame(() => {
      canvas.style.transition = prevTransition || 'transform .28s ease';
    });
  }
}

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoomAt(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY);
}, {passive:false});

viewport.addEventListener('mousedown', (e) => {
  if (e.target.closest('.toolbtn') || e.target.closest('.node-card') || e.target.closest('.toggle')) return;
  canvas.style.transition = 'none';
  isDragging = true;
  dragMoved = false;
  viewport.classList.add('dragging');
  startX = e.clientX - x;
  startY = e.clientY - y;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const nx = e.clientX - startX;
  const ny = e.clientY - startY;
  if (Math.abs(nx-x) > 2 || Math.abs(ny-y) > 2) dragMoved = true;
  x = nx; y = ny; applyTransform();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  viewport.classList.remove('dragging');
  canvas.style.transition = 'transform .28s ease';
  setTimeout(() => { dragMoved = false; }, 30);
});

function distance(a, b){
  const dx = a.clientX - b.clientX;
  const dy = a.clientY - b.clientY;
  return Math.hypot(dx, dy);
}
function midpoint(a, b){
  return {x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2};
}

viewport.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.toolbtn')) return;

  const onNode = e.target.closest('.node-card') || e.target.closest('.toggle');

  if (e.pointerType === 'mouse' && onNode) return;

  activeTouches.set(e.pointerId, {clientX: e.clientX, clientY: e.clientY});
  try { viewport.setPointerCapture(e.pointerId); } catch(err) {}

  if (activeTouches.size === 1){
    const p = [...activeTouches.values()][0];
    isDragging = true;
    dragMoved = false;
    viewport.classList.add('dragging');
    startX = p.clientX - x;
    startY = p.clientY - y;
  } else if (activeTouches.size === 2){
    isDragging = false;
    viewport.classList.remove('dragging');
    const [a, b] = [...activeTouches.values()];
    pinchStartDist = distance(a, b);
    pinchStartScale = scale;
  }
}, {passive:false});

viewport.addEventListener('pointermove', (e) => {
  if (!activeTouches.has(e.pointerId)) return;
  activeTouches.set(e.pointerId, {clientX: e.clientX, clientY: e.clientY});

  if (activeTouches.size === 1 && isDragging){
    const p = [...activeTouches.values()][0];
    const nx = p.clientX - startX;
    const ny = p.clientY - startY;
    if (Math.abs(nx-x) > 2 || Math.abs(ny-y) > 2) dragMoved = true;
    x = nx; y = ny; applyTransform();
    e.preventDefault();
  } else if (activeTouches.size === 2){
    const [a, b] = [...activeTouches.values()];
    const dist = distance(a, b);
    const center = midpoint(a, b);
    if (pinchStartDist && pinchStartDist > 0){
      const newScale = pinchStartScale * (dist / pinchStartDist);
      setScaleAt(newScale, center.x, center.y);
      dragMoved = true;
    }
    e.preventDefault();
  }
}, {passive:false});

function clearPointer(e){
  activeTouches.delete(e.pointerId);
  if (activeTouches.size === 0){
    isDragging = false;
    pinchStartDist = null;
    viewport.classList.remove('dragging');
    canvas.style.transition = 'transform .28s ease';
    setTimeout(() => { dragMoved = false; }, 30);
  } else if (activeTouches.size === 1){
    const p = [...activeTouches.values()][0];
    isDragging = true;
    startX = p.clientX - x;
    startY = p.clientY - y;
    pinchStartDist = null;
  }
}

viewport.addEventListener('pointerup', clearPointer);
viewport.addEventListener('pointercancel', clearPointer);
viewport.addEventListener('pointerleave', (e) => {
  if (e.pointerType === 'mouse') return;
  clearPointer(e);
});

document.getElementById('zoomIn').onclick = () => zoomAt(1.12);
document.getElementById('zoomOut').onclick = () => zoomAt(0.89);

document.getElementById('expandAll').onclick = () => {
  document.querySelectorAll('.children').forEach(ul => openChildrenList(ul));
  setTimeout(() => { applyTransform(); }, 240);
};

document.getElementById('findTree').onclick = () => { fitView(); };

document.getElementById('collapseAll').onclick = () => {
  document.querySelectorAll('.children').forEach(ul => closeChildrenList(ul));
  setTimeout(() => { applyTransform(); }, 180);
};

function openChildrenList(ul) {
  const li = ul.parentElement;
  const toggle = li.querySelector(':scope > .node-row .toggle');
  if (toggle && !toggle.classList.contains('hidden')) {
    toggle.innerHTML = '<span class="sym">−</span>';
  }
  li.dataset.open = '1';
  ul.classList.add('open');
  const children = [...ul.children];
  children.forEach((child, i) => {
    child.style.transitionDelay = `${i * 20}ms`;
    child.classList.remove('reveal');
  });
  requestAnimationFrame(() => {
    children.forEach((child, i) => {
      setTimeout(() => child.classList.add('reveal'), i * 20);
    });
  });
}

function closeChildrenList(ul) {
  const li = ul.parentElement;
  const toggle = li.querySelector(':scope > .node-row .toggle');
  if (toggle && !toggle.classList.contains('hidden')) {
    toggle.innerHTML = '<span class="sym">+</span>';
  }
  li.dataset.open = '0';
  const children = [...ul.children];
  children.forEach(child => child.classList.remove('reveal'));
  ul.classList.remove('open');
}

function fitView(){
  const tree = canvas.querySelector('.tree');
  if (!tree) return;

  const prevTransform = canvas.style.transform;
  const prevTransition = canvas.style.transition;
  canvas.style.transition = 'none';
  canvas.style.transform = 'translate(0px,0px) scale(1)';
  const rect = tree.getBoundingClientRect();
  canvas.style.transform = prevTransform;

  const pad = 28;
  const availableW = viewport.clientWidth - pad * 2;
  const availableH = viewport.clientHeight - pad * 2;
  const targetScale = Math.min(availableW / rect.width, availableH / rect.height, 1);
  scale = Math.max(0.22, Math.min(2.6, targetScale));

  x = Math.round((viewport.clientWidth - rect.width * scale) / 2 - rect.left * scale);
  y = Math.round((viewport.clientHeight - rect.height * scale) / 2 - rect.top * scale);

  applyTransform();

  requestAnimationFrame(() => {
    canvas.style.transition = prevTransition || 'transform .28s ease';
  });
}

const toolbar = document.getElementById('toolbar');
const menuToggle = document.getElementById('menuToggle');

function syncMenuMode(){
  if (window.innerWidth > 900){
    toolbar.classList.add('open');
  } else {
    toolbar.classList.remove('open');
  }
}
if (menuToggle && toolbar){
  menuToggle.addEventListener('click', () => {
    if (window.innerWidth <= 900) toolbar.classList.toggle('open');
  });
}
window.addEventListener('resize', syncMenuMode);
syncMenuMode();

applyTransform();
setTimeout(() => centerRoot(false), 80);
setTimeout(() => centerRoot(false), 220);
setTimeout(() => centerRoot(false), 420);

</script>
</body>
